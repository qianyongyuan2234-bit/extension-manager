<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>扩展管理器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- bridge indicator -->
  <div id="bridge-bar" class="bridge-bar hidden">
    <span id="bridge-text"></span>
  </div>

  <!-- tabs -->
  <nav class="tabs">
    <button class="tab active" data-tab="extensions">扩展</button>
    <button class="tab" data-tab="sider">Sider</button>
  </nav>

  <!-- extensions panel -->
  <div id="panel-extensions" class="panel">
    <header class="toolbar">
      <input type="text" id="search" placeholder="搜索扩展..." autofocus>
      <div class="stats">
        <span id="count">0</span> 个扩展
        <button id="profile-btn" title="场景配置">⚙</button>
      </div>
    </header>

    <div id="profile-bar" class="profile-bar hidden">
      <select id="profile-select">
        <option value="">-- 选择场景 --</option>
      </select>
      <button id="profile-apply">应用</button>
      <button id="profile-save">保存当前为场景</button>
    </div>

    <ul id="list" class="ext-list"></ul>

    <div id="profile-modal" class="modal hidden">
      <div class="modal-body">
        <h3>保存场景</h3>
        <input type="text" id="profile-name" placeholder="场景名称，如「工作」「摸鱼」">
        <div class="modal-actions">
          <button id="profile-cancel">取消</button>
          <button id="profile-confirm">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- sider panel -->
  <div id="panel-sider" class="panel hidden">
    <div class="sider-section">
      <div class="sider-header">
        <label>目标页面 URL</label>
        <input type="text" id="sider-url" value="https://sider.ai/" placeholder="Sider 网页版地址">
      </div>

      <div class="sider-header">
        <label>输入框选择器</label>
        <div class="selector-row">
          <input type="text" id="sider-selector" value="" placeholder="自动检测">
          <button id="sider-detect">检测</button>
        </div>
      </div>

      <div class="sider-header">
        <label>发送按钮选择器</label>
        <div class="selector-row">
          <input type="text" id="sider-send-btn-sel" value="" placeholder="自动检测">
          <button id="sider-detect-send">检测</button>
        </div>
      </div>

      <textarea id="sider-input" rows="4" placeholder="输入要发送给 Sider 的文字..."></textarea>

      <div class="sider-actions">
        <div class="sider-quick">
          <span class="label">快捷填入：</span>
          <button data-fill="current-page">当前页面摘要</button>
          <button data-fill="selected-text">选中文字</button>
          <button data-fill="clipboard">剪贴板</button>
        </div>
        <div class="send-row">
          <button id="sider-send" class="primary-btn">发送到 Sider</button>
          <button id="sider-auto" class="primary-btn accent">发送并等待回复</button>
        </div>
      </div>

      <div id="sider-progress" class="sider-progress hidden">
        <span class="spinner"></span>
        <span id="sider-progress-text">等待回复中...</span>
      </div>

      <div id="sider-status" class="sider-status hidden"></div>

      <div id="sider-response" class="sider-response hidden">
        <div class="response-header">
          <span class="label">回复结果</span>
          <button id="sider-copy-resp">复制</button>
        </div>
        <div id="sider-response-text"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
